name: Build and Release

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'release/*'
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ARM tools
        run: make arm_sdk_install

      - name: Install BlocksRuntime
        run: sudo apt-get update && sudo apt-get install -y libblocksruntime-dev

      - name: Run unit tests
        run: make test || true

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [STM32F405, STM32F411, STM32F7X2, STM32F745, STM32G47X, STM32H743]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ARM tools
        run: make arm_sdk_install

      - name: Build ${{ matrix.target }}
        run: make ${{ matrix.target }} FLASH_CONFIG_ERASE=yes

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rotorflight-${{ matrix.target }}
          path: obj/rotorflight*.hex

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/release/')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ARM tools
        run: make arm_sdk_install

      - name: Set build variables
        run: |
          GIT_VER=${GITHUB_REF##*/}
          GIT_TAG=${GITHUB_REF##refs/tags/}
          if [[ ${GIT_VER} =~ ^[0-9]+[.][0-9]+[.][0-9]+[-][A-Za-z0-9]+ ]]
          then
            GIT_PRE="${GIT_VER##*-}"
            GH_TYPE='Release Candidate'
          else
            GIT_PRE=''
            GH_TYPE='Release'
          fi
          echo "GIT_VER=${GIT_VER}" >> ${GITHUB_ENV}
          echo "GIT_TAG=${GIT_TAG}" >> ${GITHUB_ENV}
          echo "GIT_PRE=${GIT_PRE}" >> ${GITHUB_ENV}
          echo "GH_TYPE=${GH_TYPE}" >> ${GITHUB_ENV}

      - name: Build all unified targets
        run: make unified FC_VER_SUFFIX="${{ env.GIT_PRE }}" FLASH_CONFIG_ERASE=yes

      - name: Create Release
        run: |
          .github/scripts/extract-release-notes.py "${{ env.GIT_VER }}" Releases.md > Notes.md
          gh release create ${{ env.GIT_TAG }} --notes-file Notes.md --title "Rotorflight ${{ env.GH_TYPE }} ${{ env.GIT_VER }}" obj/*.hex
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        run: |
          VERSION=$(date +%Y%m%d)-${GITHUB_SHA:0:7}
          gh release create nightly --title "Nightly Build $VERSION" --notes "Auto-generated nightly build" artifacts/**/*.hex
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
